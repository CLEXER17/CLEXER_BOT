# Adds Node.js + the official Claude Code CLI alongside the existing Python
# build, WITHOUT overriding Python's own auto-generated setup/install phases
# (which still run pip install -r requirements.txt exactly as before).
# This is purely additive — if it breaks the build, delete this file and the
# deploy goes back to being pure-Python, unaffected.
providers = ["python", "node"]

[phases.installClaudeCLI]
dependsOn = ["setup"]
cmds = ["npm install -g @anthropic-ai/claude-code"]
